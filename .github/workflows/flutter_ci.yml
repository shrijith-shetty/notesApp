name: Flutter CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java (needed for Android build)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          cannel: stable
          cache: true

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5️⃣ Check formatting (optional but recommended)
      - name: Format code
        run: dart format --output=none --set-exit-if-changed .

      # 6️⃣ Analyze code
      - name: Analyze project source
        run: flutter analyze

      # 7️⃣ Run tests (if you have any)
      - name: Run tests
        run: flutter test

      # 8️⃣ Build APK
      - name: Build APK
        run: flutter build apk --release

      # 9️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk